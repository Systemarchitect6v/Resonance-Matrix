<script>
    // System Domain State Tracker
    let activeDomain = "General Space-Time Matrix";

    // Domain Selector Activation Matrix
    function setDomain(domainName, element) {
        activeDomain = domainName;
        
        // Remove active class from all buttons
        const buttons = document.querySelectorAll('.domain-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        
        // Add active class to clicked button
        element.classList.add('active');
        
        // Update the functional UI sub-header to display active track
        document.getElementById('activeDomainDisplay').innerText = `Current Track: ${activeDomain}`;
    }

    // Modernized Adaptive Audit Engine Connection
    function executeAdaptiveAudit() {
        const fieldA = document.getElementById('mathInput').value.trim(); 
        const fieldB = document.getElementById('intentInput').value.trim(); 
        
        if (!fieldA || !fieldB) { 
            document.getElementById('aiOutputText').innerHTML = `System Alert: Input fields require population to perform a mathematical parameter verification.`; 
            return; 
        }
        
        document.getElementById('statusText').innerText = "TRANSMITTING DATA TO SECURE VAULT CO-CALCULATOR..."; 
        document.getElementById('statusText').style.color = "#3498db";
        document.getElementById('aiOutputText').innerText = "Establishing secure connection, validating input dimensions, and parsing custom coordinate frameworks...";

        fetch('/api/verify-trajectory', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ 
                domain: activeDomain, 
                mathData: fieldA, 
                intent: fieldB 
            })
        })
        .then(response => response.json())
        .then(data => {
            // If the backend sent an analytical output, display it directly
            if (data.analysisOutput) {
                document.getElementById('statusText').innerText = "DATA AUDIT COMPLETE & VARIANCE MEASURED"; 
                document.getElementById('statusText').style.color = "#55efc4";
                document.getElementById('aiOutputText').innerText = data.analysisOutput;
            } else if (data.error) {
                throw new Error(data.error);
            } else {
                throw new Error("Unrecognized data format returned from server.");
            }
        })
        .catch(error => {
            document.getElementById('statusText').innerText = "EXECUTION EXCEPTION"; 
            document.getElementById('statusText').style.color = "#ff7675";
            document.getElementById('aiOutputText').innerText = `System Alert: The server responded, but encountered an issue processing the request.\n\nDetails: ${error.message}`;
        });
    }
</script>
